name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: [self-hosted, mac-mini]
    env:
      PATH: /opt/homebrew/opt/node@22/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin
    steps:
      - uses: actions/checkout@v4
      - run: pnpm install
      - run: pnpm build
      - name: Deploy con PM2
        run: |
          if pm2 describe "task-hub" > /dev/null 2>&1; then
            pm2 reload "task-hub" --update-env
          else
            pm2 start dist/main.js --name "task-hub"
            pm2 save
          fi